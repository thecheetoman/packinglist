{% extends 'base.html' %}

{% block content %}
  <h2>Admin — Add Item</h2>
  <form method="post">
    <div>
      <label>Tool name<br><input name="tool" required></label>
    </div>
    <div>
      <label>Where to put<br><input name="where_to_put"></label>
    </div>
    <div>
      <label>Where to find<br><input name="where_to_find"></input></label>
    </div>
    <div>
      <label>Quantity<br><input name="quantity"></label>
    </div>
    <div style="margin-top:8px">
      <button type="submit">Add</button>
    </div>
  </form>

  <h3 style="margin-top:20px">Existing items</h3>
  <ul>
    {% for it in items %}
      <li>{{it.tool}} — {{it.quantity}} — {{it.where_to_put}} — {{it.where_to_find}}</li>
    {% else %}
      <li>No items</li>
    {% endfor %}
  </ul>
{% endblock %}
